# SpeakEasy Reports — iOS build + TestFlight upload
# Prerequisites in Codemagic Team settings:
#   1. Team integrations → Developer Portal → App Store Connect API key (App Manager role)
#   2. Code signing identities → Apple Distribution cert + App Store profile for com.speakeasy.speakeasyReports
#   3. App Store Connect → app record for com.speakeasy.speakeasyReports (create once if missing)
# If your API key name in Codemagic is not "SpeakEasy", change integrations.app_store_connect below.

workflows:
  speakeasy-ios:
    name: SpeakEasy Reports iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile
    integrations:
      app_store_connect: SpeakEasy
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.speakeasy.speakeasyReports
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Install iOS pods
        script: |
          cd ios
          pod install
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --export-options-plist $HOME/export_options.plist
      - name: Build iOS IPA
        script: flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Uncomment and set your TestFlight group names from App Store Connect:
        # beta_groups:
        #   - Internal Testers