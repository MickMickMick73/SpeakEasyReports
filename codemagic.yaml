# SpeakEasy Reports — iOS build + TestFlight (automatic code signing)
# One-time setup in Codemagic app Environment variables:
#   Group: global
#   CERTIFICATE_PRIVATE_KEY = contents of SpeakEasy_distribution_private_key.pem
#   (see SETUP-Codemagic-AutoSigning.bat)
# App Store Connect API vars in group "global":
#   APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_IDENTIFIER,
#   APP_STORE_CONNECT_PRIVATE_KEY, CERTIFICATE_PRIVATE_KEY

workflows:
  speakeasy-ios:
    name: SpeakEasy Reports iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile
    environment:
      groups:
        - global
      vars:
        BUNDLE_ID: com.speakeasy.speakeasyReports
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Verify iOS bundle ID
        script: |
          set -e
          if ! grep -q "PRODUCT_BUNDLE_IDENTIFIER = ${BUNDLE_ID};" ios/Runner.xcodeproj/project.pbxproj; then
            echo "ERROR: ios/Runner.xcodeproj must use ${BUNDLE_ID}"
            exit 1
          fi
          echo "Bundle ID OK: ${BUNDLE_ID}"
      - name: Get packages
        script: flutter pub get
      - name: Install iOS pods
        script: |
          cd ios
          pod install
      - name: Set up keychain for code signing
        script: keychain initialize
      - name: Fetch signing files from App Store Connect
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --strict-match-identifier \
            --platform IOS
      - name: Add signing certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --export-options-plist $HOME/export_options.plist
      - name: Build iOS IPA
        script: flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true