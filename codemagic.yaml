# SpeakEasy Reports — iOS build on cloud Mac (Windows cannot build IPA locally)
# Setup: https://codemagic.io → connect GitHub repo → enable this workflow
# Add Apple Developer code signing in Codemagic → Teams → Code signing identities

workflows:
  speakeasy-ios:
    name: SpeakEasy Reports iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: development
        bundle_identifier: com.speakeasy.speakeasyReports
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Install iOS pods
        script: |
          cd ios
          pod install
      - name: Build iOS IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    # Add your email under publishing after first successful build