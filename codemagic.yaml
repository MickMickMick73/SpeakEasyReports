# SpeakEasy Reports — iOS build + TestFlight upload
# Signing setup: run SETUP-Codemagic-Signing.bat (TestFlight / App Store path)
# Prerequisites:
#   1. Team integrations → Developer Portal → App Store Connect API key (App Manager)
#   2. Code signing → speakeasy-dist cert + speakeasy-appstore-profile (see SETUP bat)
#   3. App Store Connect → app record for com.speakeasy.speakeasyReports

workflows:
  speakeasy-ios:
    name: SpeakEasy Reports iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile
    integrations:
      app_store_connect: SpeakEasy
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - speakeasy-appstore-profile
        certificates:
          - speakeasy-dist
    scripts:
      - name: Verify iOS bundle ID
        script: |
          set -e
          BUNDLE_ID="com.speakeasy.speakeasyReports"
          if ! grep -q "PRODUCT_BUNDLE_IDENTIFIER = ${BUNDLE_ID};" ios/Runner.xcodeproj/project.pbxproj; then
            echo "ERROR: ios/Runner.xcodeproj must use ${BUNDLE_ID}"
            exit 1
          fi
          echo "Bundle ID OK: ${BUNDLE_ID}"
      - name: Get packages
        script: flutter pub get
      - name: Install iOS pods
        script: |
          cd ios
          pod install
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --export-options-plist $HOME/export_options.plist
      - name: Build iOS IPA
        script: flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Uncomment and set your TestFlight group names from App Store Connect:
        # beta_groups:
        #   - Internal Testers