name: speakeasy_reports
description: SpeakEasy Reports — field inspections with voice, video, and PC sync.
publish_to: 'none'
version: 3.14.0+19

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  http: ^1.2.2
  crypto: ^3.0.6
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  uuid: ^4.5.1
  share_plus: ^10.1.2
  pdf: ^3.11.1
  printing: ^5.13.4
  intl: ^0.20.2
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  webview_flutter: ^4.10.0
  flutter_email_sender: ^7.0.0
  app_links: ^6.3.3
  gal: ^2.3.0
  mobile_scanner: ^7.0.1
  flutter_image_compress: ^2.4.0
  video_player: ^2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/splash/
    - assets/splash/candidates/